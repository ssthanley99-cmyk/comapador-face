<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comparador Facial</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="bg"></div>

  <main class="wrap">
    <header class="top">
      <h1>Comparador Facial</h1>
      <p class="sub">Envie duas fotos e veja a semelhança (Face++).</p>
    </header>

    <section class="card">
      <form id="formCompare" class="grid" enctype="multipart/form-data">
        <div class="slot">
          <div class="slot-head">
            <h2>Foto 1</h2>
            <label class="filebtn">
              <input id="img1" name="image1" type="file" accept="image/*" required>
              <span>Escolher arquivo</span>
            </label>
          </div>

          <div class="preview">
            <img id="prev1" alt="Preview Foto 1" />
            <div class="preview-hint" id="hint1">Nenhuma foto selecionada</div>
          </div>
        </div>

        <div class="slot">
          <div class="slot-head">
            <h2>Foto 2</h2>
            <label class="filebtn">
              <input id="img2" name="image2" type="file" accept="image/*" required>
              <span>Escolher arquivo</span>
            </label>
          </div>

          <div class="preview">
            <img id="prev2" alt="Preview Foto 2" />
            <div class="preview-hint" id="hint2">Nenhuma foto selecionada</div>
          </div>
        </div>

        <div class="actions">
          <button id="btnCompare" class="btn" type="submit">
            Comparar
          </button>
          <div id="loading" class="loading" hidden>Comparando…</div>
        </div>

        <div id="result" class="result" hidden></div>

        <p class="tip">
          Dica: foto nítida e rosto de frente dá resultado melhor.
        </p>
      </form>
    </section>
  </main>

<script>
  const img1 = document.getElementById("img1");
  const img2 = document.getElementById("img2");
  const prev1 = document.getElementById("prev1");
  const prev2 = document.getElementById("prev2");
  const hint1 = document.getElementById("hint1");
  const hint2 = document.getElementById("hint2");
  const form = document.getElementById("formCompare");
  const resultBox = document.getElementById("result");
  const loading = document.getElementById("loading");
  const btn = document.getElementById("btnCompare");

  function setPreview(input, imgEl, hintEl) {
    const file = input.files && input.files[0];
    if (!file) {
      imgEl.removeAttribute("src");
      imgEl.style.display = "none";
      hintEl.style.display = "block";
      return;
    }
    const url = URL.createObjectURL(file);
    imgEl.src = url;
    imgEl.style.display = "block";
    hintEl.style.display = "none";
  }

  img1.addEventListener("change", () => setPreview(img1, prev1, hint1));
  img2.addEventListener("change", () => setPreview(img2, prev2, hint2));

  function showResultOk(confidence, thresholds) {
    const th = thresholds || {};
    resultBox.className = "result ok";
    resultBox.hidden = false;

    const c = (confidence ?? 0).toFixed ? confidence.toFixed(2) : confidence;

    resultBox.innerHTML = `
      <div class="result-title">Semelhança</div>
      <div class="score">${c}</div>
      <div class="mini">
        <span>Thresholds:</span>
        <code>1e-3=${(th["1e-3"] ?? "-")}</code>
        <code>1e-4=${(th["1e-4"] ?? "-")}</code>
        <code>1e-5=${(th["1e-5"] ?? "-")}</code>
      </div>
    `;
  }

  function showResultErr(msg) {
    resultBox.className = "result err";
    resultBox.hidden = false;
    resultBox.innerHTML = `<div class="result-title">Erro</div><div class="msg">${msg}</div>`;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    resultBox.hidden = true;
    loading.hidden = false;
    btn.disabled = true;

    try {
      const fd = new FormData(form);

      // IMPORTANTE: aqui é rota RELATIVA, funciona no Render e local
      const res = await fetch("/api/compare", { method: "POST", body: fd });

      let data = null;
      try { data = await res.json(); } catch {}

      if (!res.ok) {
        const msg = (data && (data.error || data.error_message)) ? (data.error || data.error_message) : `Erro HTTP ${res.status}`;
        showResultErr(msg);
        return;
      }

      if (!data || typeof data.confidence === "undefined") {
        showResultErr((data && (data.error || data.error_message)) ? (data.error || data.error_message) : "Resposta inválida do servidor.");
        return;
      }

      showResultOk(data.confidence, data.thresholds);
    } catch (err) {
      showResultErr("Falha de rede ao comparar (servidor fora do ar ou rota /api/compare com erro).");
    } finally {
      loading.hidden = true;
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
